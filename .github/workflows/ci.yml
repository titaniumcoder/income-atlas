name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
      
      - name: Install generate tool
        run: make install-generate
      
      - name: Generate schema code
        run: make generate
      
      - name: Format check
        run: make fmt
      
      - name: Vet
        run: make vet
      
      - name: Test
        run: make test
