name: Release

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            GOOS: linux
            GOARCH: amd64
            EXT: ""
          - os: macos-latest
            GOOS: darwin
            GOARCH: amd64
            EXT: ""
          - os: windows-latest
            GOOS: windows
            GOARCH: amd64
            EXT: ".exe"
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
      
      - name: Install generate tool
        run: make install-generate
      
      - name: Generate schema code
        run: make generate
      
      - name: Build binary
        env:
          GOOS: ${{ matrix.GOOS }}
          GOARCH: ${{ matrix.GOARCH }}
        run: |
          go build -ldflags="-s -w" -o "bin/income-atlas-${{ matrix.GOOS }}-${{ matrix.GOARCH }}${{ matrix.EXT }}" .

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            TAG_NAME="${GITHUB_REF#refs/tags/}"
            gh release create "$TAG_NAME" "bin/income-atlas-${{ matrix.GOOS }}-${{ matrix.GOARCH }}${{ matrix.EXT }}" --title "Release $TAG_NAME" --draft=false
          fi
      
      - name: Upload asset (macOS)
        if: ${{ matrix.os == 'macos-latest' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          gh release upload "$TAG_NAME" "bin/income-atlas-${{ matrix.GOOS }}-${{ matrix.GOARCH }}${{ matrix.EXT }}"

      - name: Upload asset (Windows)
        if: ${{ matrix.os == 'windows-latest' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          gh release upload "$TAG_NAME" "bin/income-atlas-${{ matrix.GOOS }}-${{ matrix.GOARCH }}${{ matrix.EXT }}"
