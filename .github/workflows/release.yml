name: Release

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
      
      - name: Install generate tool
        run: make install-generate
      
      - name: Generate schema code
        run: make generate
      
      - name: Build Linux binary
        env:
          GOOS: linux
          GOARCH: amd64
        run: |
          go build -ldflags="-s -w" -o "bin/income-atlas-linux-amd64" .

      - name: Build macOS binary
        env:
          GOOS: darwin
          GOARCH: amd64
        run: |
          go build -ldflags="-s -w" -o "bin/income-atlas-darwin-amd64" .

      - name: Build Windows binary
        env:
          GOOS: windows
          GOARCH: amd64
        shell: bash
        run: |
          go build -ldflags="-s -w" -o "bin/income-atlas-windows-amd64.exe" .

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          gh release create "$TAG_NAME" \
            "bin/income-atlas-linux-amd64" \
            "bin/income-atlas-darwin-amd64" \
            "bin/income-atlas-windows-amd64.exe" \
            --title "Release $TAG_NAME" \
            --draft=false
