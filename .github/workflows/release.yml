name: Release

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
      
      - name: Install generate tool
        run: make install-generate
      
      - name: Generate schema code
        run: make generate
      
      - name: Build binary
        run: make build
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: bin/income-atlas
          draft: false
