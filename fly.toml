# fly.toml app configuration file generated for income-atlas on 2026-06-12T19:37:24+03:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'income-atlas'
primary_region = 'fra'

[build]
  [build.args]
    GO_VERSION = '1.26.4'

[env]
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '256mb'
  cpus = 1
  memory_mb = 256
